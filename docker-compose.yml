services:
  bot:
    build: .
    container_name: userofthedaybot
    restart: unless-stopped          # автоперезапуск при падении и после перезагрузки сервера
    env_file: .env                   # BOT_TOKEN, BOT_USERNAME, BOT_TIMEZONE
    environment:
      DB_URL: "jdbc:sqlite:/data/bot.db"
    volumes:
      - bot-data:/data               # база сохраняется между перезапусками

volumes:
  bot-data:
