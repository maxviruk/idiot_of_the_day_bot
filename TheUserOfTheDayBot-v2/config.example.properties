# Скопируй этот файл в config.properties и заполни значения.
# config.properties НЕ должен попадать в git (см. .gitignore).

bot.username=YourBotUsername
bot.token=123456789:AAExxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx

# SQLite: вся база — в одном файле. Отдельный сервер не нужен.
# Путь можно поменять, например на абсолютный: jdbc:sqlite:/var/bot/bot.db
db.url=jdbc:sqlite:bot.db

# Часовой пояс для определения "сегодня" (когда сбрасывается дневной розыгрыш)
bot.timezone=Europe/Moscow
